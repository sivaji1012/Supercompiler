name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # 1. Checkout this repo into packages/MorkSupercompiler
      #    so relative paths ../MORK and ../PathMap resolve correctly.
      - uses: actions/checkout@v4
        with:
          path: packages/MorkSupercompiler

      # 2. Clone the two git dependencies as siblings (mirroring local dev setup).
      - name: Clone PathMap
        run: git clone https://github.com/sivaji1012/PathMap.git packages/PathMap

      - name: Clone MORK
        run: git clone https://github.com/sivaji1012/MORK.git packages/MORK

      # 3. Set up Julia.
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      # 4. Cache Julia depot (packages + compiled artifacts).
      - uses: julia-actions/cache@v2

      # 5. Wire local deps via Pkg.develop + run tests.
      #    This mirrors the local setup: `Pkg.develop([PathMap, MORK])`.
      - name: Install deps and test
        working-directory: packages/MorkSupercompiler
        run: |
          julia --project=. -e '
            import Pkg
            Pkg.develop([
              Pkg.PackageSpec(path="../PathMap"),
              Pkg.PackageSpec(path="../MORK")
            ])
            Pkg.test(; coverage=true)
          '

      # 6. Process coverage.
      - uses: julia-actions/julia-processcoverage@v1
        working-directory: packages/MorkSupercompiler

      - uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          file: packages/MorkSupercompiler/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
